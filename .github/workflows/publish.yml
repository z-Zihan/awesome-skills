name: Publish to ClawHub

on:
  push:
    branches: [main]
    paths:
      - '**/SKILL.md'
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install ClawHub CLI
        run: npm i -g clawhub

      - name: Login to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: clawhub login --token "$CLAWHUB_TOKEN"

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # run_number always increments, guaranteed unique
            VERSION="0.1.${{ github.run_number }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing version: ${VERSION}"

      - name: Detect changed skills
        id: changed
        run: |
          CHANGED_SKILLS=""
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Tag push: publish all skills
            echo "Tag push detected, publishing all skills"
            for dir in */; do
              if [ -f "${dir}SKILL.md" ]; then
                slug=$(basename "$dir")
                CHANGED_SKILLS="${CHANGED_SKILLS} ${slug}"
              fi
            done
          else
            # Branch push: only publish skills with changed SKILL.md
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- '**/SKILL.md')
            else
              # First commit or shallow clone fallback: check all SKILL.md
              CHANGED_FILES=$(git ls-files '**/SKILL.md')
            fi

            for file in ${CHANGED_FILES}; do
              # Extract skill directory name (e.g., "code-review-ProMax/SKILL.md" -> "code-review-ProMax")
              skill_dir=$(dirname "$file")
              slug=$(basename "$skill_dir")
              CHANGED_SKILLS="${CHANGED_SKILLS} ${slug}"
            done
          fi

          echo "skills=${CHANGED_SKILLS}" >> $GITHUB_OUTPUT
          echo "Changed skills:${CHANGED_SKILLS}"

      - name: Debug skill file sizes
        if: steps.changed.outputs.skills != ''
        run: |
          for slug in ${{ steps.changed.outputs.skills }}; do
            echo "Checking ${slug}..."
            echo "Files:"
            find "./${slug}" -type f -maxdepth 3 -print0 | xargs -0 wc -c | sort -nr
            echo ""
            echo "SKILL.md stats:"
            wc -c "./${slug}/SKILL.md" || true
            wc -w "./${slug}/SKILL.md" || true
            echo "---"
          done

      - name: Log SKILL token size
        if: steps.changed.outputs.skills != ''
        run: |
          npm i gpt-tokenizer
          for slug in ${{ steps.changed.outputs.skills }}; do
            SLUG="$slug" node -e "
            const fs = require('fs');
            const { encode } = require('gpt-tokenizer');

            const slug = process.env.SLUG;
            const file = './' + slug + '/SKILL.md';

            if (!fs.existsSync(file)) {
              console.error('Missing ' + file);
              process.exit(1);
            }

            const text = fs.readFileSync(file, 'utf8');
            const tokens = encode(text).length;

            if (tokens > 7500) {
              console.warn('⚠️ WARNING: ' + file + ' is large (' + tokens + ' tokens, recommended: < 7500). Publishing anyway.');
            } else {
              console.log('✅ ' + file + ': ' + tokens + ' tokens');
            }
            "
          done

      - name: Publish skills
        if: steps.changed.outputs.skills != ''
        run: |
          for slug in ${{ steps.changed.outputs.skills }}; do
            echo "Publishing ${slug}..."
            clawhub skill publish "./${slug}" \
              --slug "${slug}" \
              --version "${{ steps.version.outputs.version }}" \
              --changelog "Auto-publish from commit ${{ github.sha }}"
            echo "---"
          done
