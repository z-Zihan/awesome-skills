name: Publish to ClawHub

on:
  push:
    branches: [main]
    paths:
      - '**/SKILL.md'
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install ClawHub CLI
        run: npm i -g clawhub

      - name: Login to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: clawhub login --token "$CLAWHUB_TOKEN"

      - name: Detect changed skills
        id: changed
        run: |
          CHANGED_SKILLS=""
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Tag push: publish all skills
            echo "Tag push detected, publishing all skills"
            for dir in */; do
              if [ -f "${dir}SKILL.md" ]; then
                slug=$(basename "$dir")
                CHANGED_SKILLS="${CHANGED_SKILLS} ${slug}"
              fi
            done
          else
            # Branch push: only publish skills with changed SKILL.md
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- '**/SKILL.md')
            else
              # First commit or shallow clone fallback: check all SKILL.md
              CHANGED_FILES=$(git ls-files '**/SKILL.md')
            fi

            for file in ${CHANGED_FILES}; do
              # Extract top-level directory as slug (handles nested paths like "code-review-ProMax/fix/SKILL.md")
              slug=$(echo "$file" | cut -d'/' -f1)
              CHANGED_SKILLS="${CHANGED_SKILLS} ${slug}"
            done

            # Deduplicate (nested sub-skills share the same top-level slug)
            CHANGED_SKILLS=$(echo "$CHANGED_SKILLS" | tr ' ' '\n' | sort -u | tr '\n' ' ')
          fi

          echo "skills=${CHANGED_SKILLS}" >> $GITHUB_OUTPUT
          echo "Changed skills:${CHANGED_SKILLS}"

      - name: Validate versions & check increments
        if: steps.changed.outputs.skills != ''
        run: |
          npm i semver
          for slug in ${{ steps.changed.outputs.skills }}; do
            SLUG="$slug" node -e "
            const fs = require('fs');
            const semver = require('semver');
            const { execSync } = require('child_process');

            const slug = process.env.SLUG;
            const skillFile = './' + slug + '/SKILL.md';

            // Read version from SKILL.md frontmatter
            const content = fs.readFileSync(skillFile, 'utf8');
            const versionMatch = content.match(/^version:\\s*['\"]?([^'\"\\s]+)['\"]?/m);
            if (!versionMatch) {
              console.error('❌ ' + slug + ': Missing version in SKILL.md frontmatter');
              process.exit(1);
            }
            const localVersion = versionMatch[1];
            console.log('📌 ' + slug + ' SKILL.md version: ' + localVersion);

            if (!semver.valid(localVersion)) {
              console.error('❌ ' + slug + ': Invalid semver: ' + localVersion);
              process.exit(1);
            }

            // Check against ClawHub latest version
            try {
              const result = execSync('clawhub inspect ' + slug + ' --json 2>/dev/null', { encoding: 'utf8' });
              const meta = JSON.parse(result);
              const remoteVersion = meta.latestVersion?.version || meta.version;
              if (remoteVersion) {
                console.log('🌐 ' + slug + ' ClawHub latest: ' + remoteVersion);
                if (semver.lte(localVersion, remoteVersion)) {
                  console.error('❌ ' + slug + ': SKILL.md version (' + localVersion + ') must be greater than ClawHub latest (' + remoteVersion + '). Please bump the version in SKILL.md.');
                  process.exit(1);
                }
                console.log('✅ ' + slug + ': ' + localVersion + ' > ' + remoteVersion + ' (valid increment)');
              } else {
                console.log('🆕 ' + slug + ': No published version found, first publish');
              }
            } catch (e) {
              // Skill not found on ClawHub yet — first publish
              console.log('🆕 ' + slug + ': Not found on ClawHub, first publish');
            }
            "
          done

      - name: Log SKILL token size
        if: steps.changed.outputs.skills != ''
        run: |
          npm i gpt-tokenizer
          for slug in ${{ steps.changed.outputs.skills }}; do
            SLUG="$slug" node -e "
            const fs = require('fs');
            const { encode } = require('gpt-tokenizer');

            const slug = process.env.SLUG;
            const file = './' + slug + '/SKILL.md';

            if (!fs.existsSync(file)) {
              console.error('Missing ' + file);
              process.exit(1);
            }

            const text = fs.readFileSync(file, 'utf8');
            const tokens = encode(text).length;

            if (tokens > 7500) {
              console.warn('⚠️ WARNING: ' + file + ' is large (' + tokens + ' tokens, recommended: < 7500). Publishing anyway.');
            } else {
              console.log('✅ ' + file + ': ' + tokens + ' tokens');
            }
            "
          done

      - name: Publish skills
        if: steps.changed.outputs.skills != ''
        run: |
          for slug in ${{ steps.changed.outputs.skills }}; do
            # Read version from SKILL.md frontmatter
            VERSION=$(grep -m1 '^version:' "./${slug}/SKILL.md" | sed "s/version: *//;s/['\"]//g")
            echo "Publishing ${slug}@${VERSION}..."
            clawhub skill publish "./${slug}" \
              --slug "${slug}" \
              --version "${VERSION}" \
              --changelog "Auto-publish from commit ${{ github.sha }}"
            echo "---"
          done
