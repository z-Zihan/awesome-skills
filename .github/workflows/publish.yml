name: Publish to ClawHub

on:
  push:
    branches: [main]
    paths:
      - '**/SKILL.md'
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install ClawHub CLI
        run: npm i -g clawhub

      - name: Login to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: clawhub login --token "$CLAWHUB_TOKEN"

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # run_number always increments, guaranteed unique
            VERSION="0.1.${{ github.run_number }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing version: ${VERSION}"

      - name: Detect changed skills
        id: changed
        run: |
          CHANGED_SKILLS=""
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Tag push: publish all skills
            echo "Tag push detected, publishing all skills"
            for dir in */; do
              if [ -f "${dir}SKILL.md" ]; then
                slug=$(basename "$dir")
                CHANGED_SKILLS="${CHANGED_SKILLS} ${slug}"
              fi
            done
          else
            # Branch push: only publish skills with changed SKILL.md
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- '**/SKILL.md')
            else
              # First commit or shallow clone fallback: check all SKILL.md
              CHANGED_FILES=$(git ls-files '**/SKILL.md')
            fi

            for file in ${CHANGED_FILES}; do
              # Extract skill directory name (e.g., "code-review-ProMax/SKILL.md" -> "code-review-ProMax")
              skill_dir=$(dirname "$file")
              slug=$(basename "$skill_dir")
              CHANGED_SKILLS="${CHANGED_SKILLS} ${slug}"
            done
          fi

          echo "skills=${CHANGED_SKILLS}" >> $GITHUB_OUTPUT
          echo "Changed skills:${CHANGED_SKILLS}"

      - name: Publish skills
        if: steps.changed.outputs.skills != ''
        run: |
          for slug in ${{ steps.changed.outputs.skills }}; do
            echo "Publishing ${slug}..."

            # Temporarily move sub-directories out to avoid embedding token limit
            MOVED_DIR="/tmp/skill-backup-${slug}"
            if ls "./${slug}"/*/SKILL.md 1>/dev/null 2>&1; then
              echo "  Temporarily moving sub-skill dirs to avoid embedding limit..."
              mkdir -p "$MOVED_DIR"
              for subdir in "./${slug}"/*/; do
                [ -d "$subdir" ] && mv "$subdir" "$MOVED_DIR/"
                echo "  Moved: $(basename $subdir)"
              done
            fi

            clawhub skill publish "./${slug}" \
              --slug "${slug}" \
              --version "${{ steps.version.outputs.version }}" \
              --changelog "Auto-publish from commit ${{ github.sha }}"

            # Restore sub-directories
            if [ -d "$MOVED_DIR" ] && ls "$MOVED_DIR"/*/SKILL.md 1>/dev/null 2>&1; then
              echo "  Restoring sub-skill dirs..."
              mv "$MOVED_DIR"/* "./${slug}/" 2>/dev/null || true
              rm -rf "$MOVED_DIR"
            fi

            echo "---"
          done
